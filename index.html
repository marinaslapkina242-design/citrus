<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CITRUS | CREATOR EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --c-main: #00E5FF; --c-bg: #050505; --c-panel: #111; --c-text: #fff; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--c-bg); color: var(--c-text); overflow: hidden; }
        
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-family: inherit; font-weight: bold; }
        button:active { transform: scale(0.95); }

        /* ВХОД */
        #ui-login { position: fixed; inset: 0; background: url('https://w.wallhaven.cc/full/85/wallhaven-85m88y.jpg') center/cover; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid var(--c-main); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-primary { background: var(--c-main); color: #000; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }

        /* САЙТ */
        #ui-hub { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 10; }
        .hub-header { height: 70px; background: rgba(10,10,10,0.9); display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #333; }
        .hub-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #0a0a0b; border-right: 1px solid #222; padding: 20px 0; }
        .nav-item { padding: 15px 30px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color: var(--c-main); background: #151515; border-left-color: var(--c-main); }
        .content-area { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111, #000); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--c-panel); border-radius: 15px; border: 1px solid #222; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--c-main); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-thumb { height: 140px; display: flex; justify-content: center; align-items: center; font-size: 50px; background: #1a1a1a; }
        .card-info { padding: 15px; }

        #avatar-container { width: 100%; height: 400px; background: #000; border-radius: 20px; border: 1px solid #333; box-shadow: inset 0 0 50px rgba(0,229,255,0.1); }

        /* ИГРА & СТУДИЯ */
        #engine-view { position: fixed; inset: 0; display: none; z-index: 50; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud-overlay { position: absolute; inset: 0; pointer-events: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        
        .studio-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 30px; border: 1px solid var(--c-main); pointer-events: auto; display: flex; gap: 15px; align-items: center; }
        .btn-studio { background: #222; color: white; padding: 10px 20px; border-radius: 8px; }
        .btn-publish { background: var(--c-main); color: #000; padding: 10px 20px; border-radius: 8px; }
        .btn-exit { position: absolute; top: 20px; right: 20px; background: #ff3b30; color: white; padding: 10px 20px; border-radius: 8px; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-login">
        <div class="login-box">
            <h1 style="color:var(--c-main); margin-top:0; font-size:40px;">CITRUS</h1>
            <p style="color:#aaa; margin-bottom: 30px;">Твой мир. Твои правила.</p>
            <input type="text" id="username" placeholder="Никнейм..." autocomplete="off">
            <button class="btn-primary" onclick="app.login()">ВОЙТИ</button>
        </div>
    </div>

    <div id="ui-hub" class="hidden">
        <div class="hub-header">
            <h2 style="color:var(--c-main); margin:0;">CITRUS</h2>
            <div style="margin-left:auto; display:flex; align-items:center; gap:30px;">
                <span id="display-name" style="font-weight:bold;">Player</span>
                <span style="color:var(--c-main); font-weight:bold;">💎 <span id="balance-val">5000</span></span>
            </div>
        </div>
        <div class="hub-body">
            <div class="sidebar">
                <div class="nav-item active" onclick="app.switchTab('games')"><i class="fas fa-compass"></i> Плейсы</div>
                <div class="nav-item" onclick="app.switchTab('avatar')"><i class="fas fa-user-ninja"></i> Аватар</div>
                <div class="nav-item" onclick="app.switchTab('shop')"><i class="fas fa-shopping-bag"></i> Магазин</div>
                <div class="nav-item" onclick="app.switchTab('studio')"><i class="fas fa-laptop-code"></i> Студия</div>
            </div>
            <div class="content-area">
                <div id="tab-games">
                    <h2>Миры</h2>
                    <div class="grid" id="my-games-grid">
                        <div class="card" onclick="app.launch('play', 'default')">
                            <div class="card-thumb">🌍</div>
                            <div class="card-info"><b>Lobby</b></div>
                        </div>
                    </div>
                </div>
                <div id="tab-avatar" class="hidden">
                    <h2>Аватар</h2>
                    <div style="display:flex; gap:20px;">
                        <div id="avatar-container" style="flex:2;"></div>
                        <button class="btn-primary" onclick="app.resetAvatar()" style="flex:1; height:50px;">Сброс</button>
                    </div>
                </div>
                <div id="tab-shop" class="hidden">
                    <h2>Магазин</h2>
                    <div class="grid">
                        <div class="card" onclick="app.buyItem('Очки', 'glasses', 500)"><div class="card-thumb">🕶️</div><div class="card-info">500 💎</div></div>
                        <div class="card" onclick="app.buyItem('Крылья', 'wings', 1500)"><div class="card-thumb">🪽</div><div class="card-info">1500 💎</div></div>
                    </div>
                </div>
                <div id="tab-studio" class="hidden">
                    <button class="btn-primary" onclick="app.launch('studio', 'new')">СОЗДАТЬ ИГРУ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="engine-view">
        <div class="hud-overlay">
            <div id="crosshair" class="crosshair"></div>
            <div id="studio-ui" class="studio-panel hidden">
                <button class="btn-studio" onclick="app.clearMap()">Очистить</button>
                <button class="btn-publish" onclick="app.publishGame()">ОПУБЛИКОВАТЬ</button>
            </div>
            <button class="btn-exit" onclick="app.exitGame()">ВЫЙТИ</button>
        </div>
        <div id="gl-canvas"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const app = {
            username: "Player", balance: 5000, inventory: [], customMaps: [],
            scene: null, camera: null, renderer: null, clock: null,
            playerGroup: null, rig: {}, keys: {}, mode: 'none',
            velocity: new THREE.Vector3(), raycaster: new THREE.Raycaster(),
            objectsToIntersect: [], mapBlocks: [], canJump: false,

            init() {
                this.loadData();
                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);
                document.addEventListener('mousedown', (e) => {
                    if (this.mode === 'studio' && document.pointerLockElement) this.placeBlock();
                });
                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        if(this.mode === 'play' && this.playerGroup) {
                            this.playerGroup.rotation.y -= e.movementX * 0.003;
                        } else if (this.mode === 'studio') {
                            this.camera.rotation.y -= e.movementX * 0.003;
                            this.camera.rotation.x -= e.movementY * 0.003;
                        }
                    }
                });
                document.getElementById('gl-canvas').addEventListener('click', () => {
                    if (this.mode !== 'none') document.body.requestPointerLock();
                });
            },

            loadData() {
                const saved = localStorage.getItem('citrus_save_v1');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.username = data.username; this.balance = data.balance;
                    this.inventory = data.inventory; this.customMaps = data.customMaps;
                }
            },

            saveData() {
                localStorage.setItem('citrus_save_v1', JSON.stringify({
                    username: this.username, balance: this.balance, 
                    inventory: this.inventory, customMaps: this.customMaps
                }));
            },

            login() {
                const val = document.getElementById('username').value;
                if(val) this.username = val;
                document.getElementById('display-name').innerText = this.username;
                document.getElementById('balance-val').innerText = this.balance;
                document.getElementById('ui-login').classList.add('hidden');
                document.getElementById('ui-hub').classList.remove('hidden');
                this.renderMyGames();
                this.initAvatarPreview();
            },

            switchTab(id) {
                ['games', 'avatar', 'shop', 'studio'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
                document.getElementById('tab-'+id).classList.remove('hidden');
                this.updateAvatarPreview();
            },

            buyItem(n, id, p) {
                if(this.balance >= p && !this.inventory.includes(id)) {
                    this.balance -= p; this.inventory.push(id);
                    document.getElementById('balance-val').innerText = this.balance;
                    this.saveData(); this.updateAvatarPreview();
                    alert("Куплено!");
                }
            },

            buildCharacter(needsRig) {
                const group = new THREE.Group();
                const matBody = new THREE.MeshStandardMaterial({color: 0x222222});
                const matSkin = new THREE.MeshStandardMaterial({color: 0xffcc99});

                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), matBody);
                torso.position.y = 1.4; group.add(torso);

                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matSkin);
                head.position.y = 0.8; torso.add(head);

                const createLimb = (x, y) => {
                    const g = new THREE.Group();
                    const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), matBody);
                    m.geometry.translate(0, -0.5, 0); g.add(m);
                    g.position.set(x, y, 0); torso.add(g); return g;
                };

                const lA = createLimb(-0.55, 0.5); const rA = createLimb(0.55, 0.5);
                const lL = createLimb(-0.25, -0.6); const rL = createLimb(0.25, -0.6);

                if(this.inventory.includes('wings')) {
                    const w = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 0.1), new THREE.MeshStandardMaterial({color: 0x00E5FF, transparent:true, opacity:0.6}));
                    w.position.set(0, 0.2, -0.3); torso.add(w);
                }

                if(needsRig) this.rig = { leftArm: lA, rightArm: rA, leftLeg: lL, rightLeg: rL, torso };
                return group;
            },

            initAvatarPreview() {
                const cont = document.getElementById('avatar-container');
                this.pScene = new THREE.Scene();
                this.pCam = new THREE.PerspectiveCamera(45, cont.clientWidth/cont.clientHeight, 0.1, 100);
                this.pCam.position.set(0, 2, 5);
                this.pRender = new THREE.WebGLRenderer({alpha: true, antialias: true});
                this.pRender.setSize(cont.clientWidth, cont.clientHeight);
                cont.appendChild(this.pRender.domElement);
                this.pScene.add(new THREE.AmbientLight(0xffffff, 1));
                this.updateAvatarPreview();
                const loop = () => { if(this.pAvatar) this.pAvatar.rotation.y += 0.01; this.pRender.render(this.pScene, this.pCam); requestAnimationFrame(loop); };
                loop();
            },

            updateAvatarPreview() {
                if(this.pAvatar) this.pScene.remove(this.pAvatar);
                this.pAvatar = this.buildCharacter(false); this.pScene.add(this.pAvatar);
            },

            launch(mode, mapIdx) {
                this.mode = mode; this.currentMap = mapIdx;
                document.getElementById('ui-hub').classList.add('hidden');
                document.getElementById('engine-view').style.display = 'block';
                document.getElementById('crosshair').style.display = mode==='studio'?'block':'none';
                document.getElementById('studio-ui').classList.toggle('hidden', mode!=='studio');
                this.setupScene();
            },

            setupScene() {
                const canvas = document.getElementById('gl-canvas');
                canvas.innerHTML = '';
                this.scene = new THREE.Scene(); this.scene.background = new THREE.Color(0x0a0a10);
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({antialias: true});
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                canvas.appendChild(this.renderer.domElement);
                this.clock = new THREE.Clock();

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0x00E5FF, 1); sun.position.set(10, 20, 10); this.scene.add(sun);

                const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
                ground.rotation.x = -Math.PI/2; this.scene.add(ground);
                this.objectsToIntersect = [ground];
                this.mapBlocks = [];

                if(this.mode === 'play' && this.currentMap !== 'default') {
                    this.customMaps[this.currentMap].blocks.forEach(b => this.spawnBlock(b.x, b.y, b.z, b.color));
                }

                if(this.mode === 'play') {
                    this.playerGroup = this.buildCharacter(true);
                    this.playerGroup.position.set(0, 1.1, 0); this.scene.add(this.playerGroup);
                } else { this.camera.position.set(0, 10, 20); }

                this.engineLoop();
            },

            spawnBlock(x, y, z, color) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color}));
                b.position.set(x, y, z); this.scene.add(b);
                this.objectsToIntersect.push(b); this.mapBlocks.push({x, y, z, color});
            },

            placeBlock() {
                this.raycaster.setFromCamera(new THREE.Vector2(0,0), this.camera);
                const hit = this.raycaster.intersectObjects(this.objectsToIntersect)[0];
                if(hit) {
                    const p = hit.point.clone().add(hit.face.normal);
                    this.spawnBlock(Math.round(p.x/2)*2, Math.round(p.y/2)*2, Math.round(p.z/2)*2, 0x00E5FF);
                }
            },

            checkCollision(pos, moveStep) {
                const rayPos = pos.clone(); rayPos.y += 0.5;
                const rayDir = moveStep.clone().normalize();
                this.raycaster.set(rayPos, rayDir);
                const hits = this.raycaster.intersectObjects(this.objectsToIntersect.slice(1));
                if (hits.length > 0 && hits[0].distance < moveStep.length() + 0.8) return true;
                return false;
            },

            engineLoop() {
                if(this.mode === 'none') return;
                requestAnimationFrame(() => this.engineLoop());
                const delta = this.clock.getDelta();
                const time = this.clock.getElapsedTime();

                if(this.mode === 'play' && this.playerGroup) {
                    const move = new THREE.Vector3(0, 0, 0);
                    if (this.keys['KeyW']) move.z -= 1; if (this.keys['KeyS']) move.z += 1;
                    if (this.keys['KeyA']) move.x -= 1; if (this.keys['KeyD']) move.x += 1;

                    if (move.length() > 0) {
                        move.normalize();
                        const worldMove = move.applyQuaternion(this.playerGroup.quaternion).multiplyScalar(15 * delta);
                        if (!this.checkCollision(this.playerGroup.position, worldMove)) this.playerGroup.position.add(worldMove);
                    }

                    this.velocity.y -= 35 * delta;
                    this.playerGroup.position.y += this.velocity.y * delta;
                    if (this.keys['Space'] && this.canJump) { this.velocity.y = 15; this.canJump = false; }
                    if (this.playerGroup.position.y <= 1.1) { this.playerGroup.position.y = 1.1; this.velocity.y = 0; this.canJump = true; }

                    const moving = move.length() > 0;
                    if (moving && this.canJump) {
                        const s = Math.sin(time * 15) * 0.8;
                        this.rig.leftArm.rotation.x = s; this.rig.rightArm.rotation.x = -s;
                        this.rig.leftLeg.rotation.x = -s; this.rig.rightLeg.rotation.x = s;
                    }

                    const camPos = new THREE.Vector3(0, 5, 12).applyMatrix4(this.playerGroup.matrixWorld);
                    this.camera.position.lerp(camPos, 0.1);
                    this.camera.lookAt(this.playerGroup.position.x, this.playerGroup.position.y+1, this.playerGroup.position.z);
                } else if(this.mode === 'studio') {
                    const s = 30 * delta;
                    if(this.keys['KeyW']) this.camera.translateZ(-s); if(this.keys['KeyS']) this.camera.translateZ(s);
                    if(this.keys['KeyA']) this.camera.translateX(-s); if(this.keys['KeyD']) this.camera.translateX(s);
                }
                this.renderer.render(this.scene, this.camera);
            },

            publishGame() {
                const n = prompt("Название карты:");
                if(n) { this.customMaps.push({name: n, blocks: this.mapBlocks}); this.saveData(); this.exitGame(); }
            },

            clearMap() { this.setupScene(); },
            renderMyGames() {
                const grid = document.getElementById('my-games-grid');
                grid.innerHTML = '<div class="card" onclick="app.launch(\'play\', \'default\')"><div class="card-thumb">🌍</div><div class="card-info"><b>Lobby</b></div></div>';
                this.customMaps.forEach((m, i) => {
                    grid.innerHTML += `<div class="card" onclick="app.launch('play', ${i})"><div class="card-thumb">🎮</div><div class="card-info"><b>${m.name}</b></div></div>`;
                });
            },
            exitGame() { location.reload(); }
        };

        app.init();
    </script>
</body>
</html>
