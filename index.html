<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CITRUS | CREATIVE & MULTIPLAYER</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --c-main: #00E5FF; --c-bg: #050505; --c-panel: #111; --c-text: #fff; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--c-bg); color: var(--c-text); overflow: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-weight: bold; }
        #ui-login { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--c-main); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; background: #222; border: none; color: white; border-radius: 10px; outline: none; }
        .btn-primary { background: var(--c-main); color: #000; padding: 15px; border-radius: 10px; width: 100%; }
        #ui-hub { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 10; }
        .hub-header { height: 70px; background: #0a0a0a; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #333; }
        .hub-body { display: flex; flex: 1; }
        .sidebar { width: 250px; background: #0a0a0b; border-right: 1px solid #222; }
        .nav-item { padding: 20px 30px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--c-main); background: #151515; border-left: 3px solid var(--c-main); }
        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--c-panel); border-radius: 15px; border: 1px solid #222; overflow: hidden; cursor: pointer; }
        .card-thumb { height: 120px; display: flex; justify-content: center; align-items: center; font-size: 40px; background: #1a1a1a; }
        .card-info { padding: 15px; }
        #engine-view { position: fixed; inset: 0; display: none; z-index: 50; }
        .studio-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; border: 1px solid var(--c-main); display: flex; gap: 10px; pointer-events: auto; }
        .btn-exit { position: absolute; top: 20px; right: 20px; background: #ff3b30; color: white; padding: 10px 20px; border-radius: 8px; pointer-events: auto; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-login">
        <div class="login-box">
            <h1 style="color:var(--c-main);">CITRUS</h1>
            <input type="text" id="username" placeholder="Твой никнейм">
            <button class="btn-primary" onclick="app.login()">ВОЙТИ</button>
        </div>
    </div>

    <div id="ui-hub" class="hidden">
        <div class="hub-header">
            <h2>CITRUS</h2>
            <div style="margin-left:auto;"><span id="display-name"></span> | 💎 <span id="balance-val">5000</span></div>
        </div>
        <div class="hub-body">
            <div class="sidebar">
                <div class="nav-item active" onclick="app.switchTab('games')">Миры</div>
                <div class="nav-item" onclick="app.switchTab('studio')">Студия</div>
            </div>
            <div class="content-area">
                <div id="tab-games">
                    <h3>Мои игры</h3>
                    <div class="grid" id="my-games-grid"></div>
                </div>
                <div id="tab-studio" class="hidden">
                    <button class="btn-primary" onclick="app.launch('studio')">СОЗДАТЬ НОВЫЙ МИР</button>
                </div>
            </div>
        </div>
    </div>

    <div id="engine-view">
        <div class="crosshair" id="crosshair"></div>
        <div class="studio-panel hidden" id="studio-ui">
            <button onclick="app.publishGame()" style="background:var(--c-main); padding:5px 15px; border-radius:5px;">ОПУБЛИКОВАТЬ</button>
        </div>
        <button class="btn-exit" onclick="app.exitGame()">ВЫЙТИ</button>
        <div id="gl-canvas"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const app = {
            socket: null, otherPlayers: {},
            scene: null, camera: null, renderer: null, clock: null,
            playerGroup: null, rig: {}, keys: {}, mode: 'none',
            objectsToIntersect: [], mapBlocks: [], customMaps: [],
            raycaster: new THREE.Raycaster(),

            init() {
                this.socket = io();
                this.loadMaps();
                this.renderMyGames();
                
                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);
                document.addEventListener('contextmenu', e => e.preventDefault());

                this.socket.on('playerMoved', (p) => {
                    if (this.otherPlayers[p.id]) {
                        this.otherPlayers[p.id].position.set(p.x, p.y, p.z);
                        this.otherPlayers[p.id].rotation.y = p.ry;
                    }
                });
            },

            login() {
                const name = document.getElementById('username').value || "Player";
                document.getElementById('display-name').innerText = name;
                document.getElementById('ui-login').classList.add('hidden');
                document.getElementById('ui-hub').classList.remove('hidden');
                this.init();
            },

            switchTab(t) {
                document.getElementById('tab-games').classList.toggle('hidden', t !== 'games');
                document.getElementById('tab-studio').classList.toggle('hidden', t !== 'studio');
            },

            launch(mode, mapIndex = null) {
                this.mode = mode;
                document.getElementById('ui-hub').classList.add('hidden');
                document.getElementById('engine-view').style.display = 'block';
                document.getElementById('studio-ui').classList.toggle('hidden', mode !== 'studio');
                this.setupScene(mapIndex);
            },

            setupScene(mapIndex) {
                const container = document.getElementById('gl-canvas');
                container.innerHTML = '';
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x050505);
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({antialias: true});
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(this.renderer.domElement);
                this.clock = new THREE.Clock();

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
                ground.rotation.x = -Math.PI/2;
                this.scene.add(ground);
                this.objectsToIntersect = [ground];

                if(mapIndex !== null) {
                    const map = this.customMaps[mapIndex];
                    map.blocks.forEach(b => this.spawnBlock(b.x, b.y, b.z, b.color));
                }

                if(this.mode === 'studio') {
                    this.camera.position.set(0, 10, 20);
                } else {
                    this.playerGroup = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x00E5FF}));
                    body.position.y = 1;
                    this.playerGroup.add(body);
                    this.scene.add(this.playerGroup);
                }

                this.loop();
            },

            spawnBlock(x, y, z, color) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color}));
                b.position.set(x, y, z);
                this.scene.add(b);
                this.objectsToIntersect.push(b);
            },

            loop() {
                if(this.mode === 'none') return;
                requestAnimationFrame(() => this.loop());
                const dt = this.clock.getDelta();

                if(this.mode === 'studio') {
                    const s = 20 * dt;
                    if(this.keys['KeyW']) this.camera.translateZ(-s);
                    if(this.keys['KeyS']) this.camera.translateZ(s);
                    if(this.keys['KeyA']) this.camera.translateX(-s);
                    if(this.keys['KeyD']) this.camera.translateX(s);
                } else {
                    const s = 12 * dt;
                    if(this.keys['KeyW']) this.playerGroup.translateZ(-s);
                    if(this.keys['KeyS']) this.playerGroup.translateZ(s);
                    if(this.keys['KeyA']) this.playerGroup.translateX(-s);
                    if(this.keys['KeyD']) this.playerGroup.translateX(s);

                    this.camera.position.lerp(new THREE.Vector3(0, 5, 10).applyMatrix4(this.playerGroup.matrixWorld), 0.1);
                    this.camera.lookAt(this.playerGroup.position);
                    
                    this.socket.emit('playerMovement', { x: this.playerGroup.position.x, y: this.playerGroup.position.y, z: this.playerGroup.position.z, ry: this.playerGroup.rotation.y });
                }
                this.renderer.render(this.scene, this.camera);
            },

            publishGame() {
                const name = prompt("Название игры:");
                if(name) {
                    this.customMaps.push({name, blocks: this.mapBlocks});
                    localStorage.setItem('citrus_maps', JSON.stringify(this.customMaps));
                    alert("Сохранено!");
                    this.exitGame();
                }
            },

            loadMaps() {
                const saved = localStorage.getItem('citrus_maps');
                if(saved) this.customMaps = JSON.parse(saved);
            },

            renderMyGames() {
                const grid = document.getElementById('my-games-grid');
                grid.innerHTML = '';
                this.customMaps.forEach((m, i) => {
                    grid.innerHTML += `<div class="card" onclick="app.launch('play', ${i})"><div class="card-thumb">🎮</div><div class="card-info"><b>${m.name}</b></div></div>`;
                });
            },

            exitGame() { location.reload(); }
        };

        // КЛИКИ В СТУДИИ
        window.addEventListener('mousedown', (e) => {
            if(app.mode === 'studio' && document.pointerLockElement) {
                app.raycaster.setFromCamera({x:0, y:0}, app.camera);
                const hits = app.raycaster.intersectObjects(app.objectsToIntersect);
                if(hits.length > 0) {
                    const hit = hits[0];
                    if(e.button === 0) { // ЛКМ - БЛОК
                        const p = hit.point.clone().add(hit.face.normal).divideScalar(2).floor().multiplyScalar(2).addScalar(1);
                        app.spawnBlock(p.x, p.y, p.z, 0x00E5FF);
                        app.mapBlocks.push({x: p.x, y: p.y, z: p.z, color: 0x00E5FF});
                    } else if(e.button === 2 && hit.object !== app.objectsToIntersect[0]) { // ПКМ - УДАЛИТЬ
                        app.scene.remove(hit.object);
                        app.objectsToIntersect = app.objectsToIntersect.filter(o => o !== hit.object);
                    }
                }
            } else if (app.mode !== 'none') {
                document.body.requestPointerLock();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if(document.pointerLockElement) {
                if(app.mode === 'studio') {
                    app.camera.rotation.y -= e.movementX * 0.002;
                    app.camera.rotation.x -= e.movementY * 0.002;
                } else {
                    app.playerGroup.rotation.y -= e.movementX * 0.002;
                }
            }
        });
    </script>
</body>
</html>
