<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CITRUS | MULTIPLAYER EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --c-main: #00E5FF; --c-bg: #050505; --c-panel: #111; --c-text: #fff; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--c-bg); color: var(--c-text); overflow: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-family: inherit; font-weight: bold; }
        button:active { transform: scale(0.95); }
        #ui-login { position: fixed; inset: 0; background: url('https://w.wallhaven.cc/full/85/wallhaven-85m88y.jpg') center/cover; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid var(--c-main); text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-primary { background: var(--c-main); color: #000; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }
        #ui-hub { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 10; }
        .hub-header { height: 70px; background: rgba(10,10,10,0.9); display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #333; }
        .hub-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #0a0a0b; border-right: 1px solid #222; padding: 20px 0; }
        .nav-item { padding: 15px 30px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color: var(--c-main); background: #151515; border-left-color: var(--c-main); }
        .content-area { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111, #000); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--c-panel); border-radius: 15px; border: 1px solid #222; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--c-main); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-thumb { height: 140px; display: flex; justify-content: center; align-items: center; font-size: 50px; background: #1a1a1a; }
        .card-info { padding: 15px; }
        #avatar-container { width: 100%; height: 400px; background: #000; border-radius: 20px; border: 1px solid #333; box-shadow: inset 0 0 50px rgba(0,229,255,0.1); }
        #engine-view { position: fixed; inset: 0; display: none; z-index: 50; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud-overlay { position: absolute; inset: 0; pointer-events: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        .studio-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 30px; border: 1px solid var(--c-main); pointer-events: auto; display: flex; gap: 15px; align-items: center; }
        .btn-studio { background: #222; color: white; padding: 10px 20px; border-radius: 8px; }
        .btn-publish { background: var(--c-main); color: #000; padding: 10px 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,229,255,0.5); }
        .btn-exit { position: absolute; top: 20px; right: 20px; background: #ff3b30; color: white; padding: 10px 20px; border-radius: 8px; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-login">
        <div class="login-box">
            <h1 style="color:var(--c-main); margin-top:0; font-size:40px;">CITRUS</h1>
            <p style="color:#aaa; margin-bottom: 30px;">Твой мир. Твои правила.</p>
            <input type="text" id="username" placeholder="Придумай крутой никнейм" autocomplete="off">
            <button class="btn-primary" onclick="app.login()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <div id="ui-hub" class="hidden">
        <div class="hub-header">
            <h2 style="color:var(--c-main); margin:0; letter-spacing: 2px;">CITRUS</h2>
            <div style="margin-left:auto; display:flex; align-items:center; gap:30px;">
                <span id="display-name" style="font-weight:bold; font-size: 18px;">Player</span>
                <span style="background:rgba(0,229,255,0.1); padding:8px 20px; border-radius:20px; color:var(--c-main); font-weight:bold; border: 1px solid var(--c-main);">💎 <span id="balance-val">5000</span></span>
            </div>
        </div>
        <div class="hub-body">
            <div class="sidebar">
                <div class="nav-item active" onclick="app.switchTab('games')"><i class="fas fa-compass"></i> Плейсы</div>
                <div class="nav-item" onclick="app.switchTab('avatar')"><i class="fas fa-user-ninja"></i> Аватар 2.0</div>
                <div class="nav-item" onclick="app.switchTab('shop')"><i class="fas fa-shopping-bag"></i> Магазин</div>
                <div class="nav-item" onclick="app.switchTab('studio')"><i class="fas fa-laptop-code"></i> Студия</div>
            </div>
            <div class="content-area">
                <div id="tab-games">
                    <h2>Официальные миры</h2>
                    <div class="grid" style="margin-bottom: 40px;">
                        <div class="card" onclick="app.launch('play', 'default')">
                            <div class="card-thumb" style="background: linear-gradient(45deg, #111, #333);">🌍</div>
                            <div class="card-info"><b>Citrus Open World</b><br><small style="color:#888;">Мультиплеер-сервер</small></div>
                        </div>
                    </div>
                    <h2 style="color: var(--c-main);">Мои опубликованные игры</h2>
                    <div class="grid" id="my-games-grid"></div>
                </div>

                <div id="tab-avatar" class="hidden">
                    <h2>Настройка Аватара</h2>
                    <div style="display:flex; gap:30px;">
                        <div style="flex:2;"><div id="avatar-container"></div></div>
                        <div style="flex:1;">
                            <div style="background:#151515; padding:30px; border-radius:20px; border:1px solid #222;">
                                <h3>Твой стиль</h3>
                                <button class="btn-primary" onclick="app.resetAvatar()" style="background:#333; color:white;">Снять всё</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-shop" class="hidden">
                    <h2>Магазин</h2>
                    <div class="grid">
                        <div class="card" onclick="app.buyItem('Кибер-Очки', 'glasses', 500)">
                            <div class="card-thumb">🕶️</div>
                            <div class="card-info"><b>Кибер-Очки</b><br>💎 500</div>
                        </div>
                        <div class="card" onclick="app.buyItem('Неоновые Крылья', 'wings', 1500)">
                            <div class="card-thumb">🪽</div>
                            <div class="card-info"><b>Неоновые Крылья</b><br>💎 1500</div>
                        </div>
                    </div>
                </div>

                <div id="tab-studio" class="hidden">
                    <div style="text-align:center; padding-top:50px;">
                        <h1 style="margin:0;">Citrus Studio</h1>
                        <button class="btn-primary" style="width:300px; margin-top:30px;" onclick="app.launch('studio', 'new')">СОЗДАТЬ НОВУЮ ИГРУ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="engine-view">
        <div class="hud-overlay">
            <div id="crosshair" class="crosshair"></div>
            <div id="studio-ui" class="studio-panel hidden">
                <button class="btn-studio" onclick="app.clearMap()">Очистить</button>
                <button class="btn-publish" onclick="app.publishGame()">ОПУБЛИКОВАТЬ</button>
            </div>
            <button class="btn-exit" onclick="app.exitGame()">ВЫЙТИ</button>
        </div>
        <div id="gl-canvas"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const app = {
            socket: null, otherPlayers: {},
            username: "Player", balance: 5000, inventory: [], customMaps: [],
            scene: null, camera: null, renderer: null, clock: null,
            playerGroup: null, rig: {}, keys: {}, mode: 'none',
            velocity: new THREE.Vector3(), direction: new THREE.Vector3(),
            canJump: false, raycaster: new THREE.Raycaster(),
            objectsToIntersect: [], mapBlocks: [],

            init() {
                this.loadData();
                this.socket = io(); // Подключаем мультиплеер

                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);
                
                // Слушаем сервер
                this.socket.on('currentPlayers', (players) => {
                    Object.keys(players).forEach(id => {
                        if (id !== this.socket.id) this.addOtherPlayer(id, players[id]);
                    });
                });
                this.socket.on('newPlayer', (p) => this.addOtherPlayer(p.id, p));
                this.socket.on('playerMoved', (p) => {
                    if (this.otherPlayers[p.id]) {
                        this.otherPlayers[p.id].position.set(p.x, p.y, p.z);
                        this.otherPlayers[p.id].rotation.y = p.ry;
                    }
                });
                this.socket.on('playerDisconnected', (id) => {
                    if (this.otherPlayers[id]) {
                        this.scene.remove(this.otherPlayers[id]);
                        delete this.otherPlayers[id];
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (document.pointerLockElement) {
                        if(this.mode === 'play' && this.playerGroup) {
                            this.playerGroup.rotation.y -= e.movementX * 0.003;
                        } else if (this.mode === 'studio') {
                            this.camera.rotation.y -= e.movementX * 0.003;
                            this.camera.rotation.x -= e.movementY * 0.003;
                        }
                    }
                });
            },

            addOtherPlayer(id, info) {
                const model = this.buildCharacter(false);
                model.position.set(info.x, info.y, info.z);
                this.otherPlayers[id] = model;
                if(this.scene) this.scene.add(model);
            },

            login() {
                const input = document.getElementById('username').value.trim();
                if(input) this.username = input;
                document.getElementById('display-name').innerText = this.username;
                document.getElementById('ui-login').classList.add('hidden');
                document.getElementById('ui-hub').classList.remove('hidden');
                this.init();
                this.initAvatarPreview();
                this.renderMyGames();
            },

            switchTab(tabId) {
                ['games', 'avatar', 'shop', 'studio'].forEach(id => document.getElementById('tab-' + id).classList.add('hidden'));
                document.getElementById('tab-' + tabId).classList.remove('hidden');
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                event.currentTarget.classList.add('active');
            },

            buildCharacter(needsRig) {
                const group = new THREE.Group();
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: 0x222222}));
                torso.position.y = 1.4;
                group.add(torso);
                
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({color: 0xffcc99}));
                head.position.y = 0.8; torso.add(head);

                const createLimb = (w, h, d) => {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: 0x111111}));
                    mesh.geometry.translate(0, -h/2, 0);
                    const pivot = new THREE.Group(); pivot.add(mesh); return pivot;
                };

                const lArm = createLimb(0.3, 1, 0.3); lArm.position.set(-0.55, 0.6, 0); torso.add(lArm);
                const rArm = createLimb(0.3, 1, 0.3); rArm.position.set(0.55, 0.6, 0); torso.add(rArm);
                const lLeg = createLimb(0.35, 1.1, 0.35); lLeg.position.set(-0.2, -0.6, 0); torso.add(lLeg);
                const rLeg = createLimb(0.35, 1.1, 0.35); rLeg.position.set(0.2, -0.6, 0); torso.add(rLeg);

                if(this.inventory.includes('wings')) {
                    const wings = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 0.1), new THREE.MeshStandardMaterial({color: 0x00E5FF, transparent: true, opacity: 0.7}));
                    wings.position.set(0, 0.2, -0.3); torso.add(wings);
                }

                if(needsRig) this.rig = { torso, lArm, rArm, lLeg, rLeg };
                return group;
            },

            launch(mode, map) {
                this.mode = mode;
                document.getElementById('ui-hub').classList.add('hidden');
                document.getElementById('engine-view').style.display = 'block';
                document.getElementById('crosshair').style.display = mode === 'studio' ? 'block' : 'none';
                document.getElementById('studio-ui').classList.toggle('hidden', mode !== 'studio');
                this.setupScene();
            },

            setupScene() {
                const canvas = document.getElementById('gl-canvas');
                canvas.innerHTML = '';
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a10);
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({antialias: true});
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                canvas.appendChild(this.renderer.domElement);
                this.clock = new THREE.Clock();

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const sun = new THREE.DirectionalLight(0x00E5FF, 1); sun.position.set(10, 20, 10); this.scene.add(sun);

                const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
                ground.rotation.x = -Math.PI/2; this.scene.add(ground);
                this.objectsToIntersect = [ground];

                // Добавляем ранее созданные блоки как твердые объекты
                this.mapBlocks.forEach(b => this.spawnBlock(b.x, b.y, b.z, b.color));

                if(this.mode === 'play') {
                    this.playerGroup = this.buildCharacter(true);
                    this.playerGroup.position.y = 0;
                    this.scene.add(this.playerGroup);
                    // Добавляем уже зашедших игроков
                    Object.values(this.otherPlayers).forEach(p => this.scene.add(p));
                } else {
                    this.camera.position.set(0, 5, 10);
                }

                this.engineLoop();
            },

            spawnBlock(x, y, z, color) {
                const block = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: color}));
                block.position.set(x, y, z);
                this.scene.add(block);
                this.objectsToIntersect.push(block);
            },

            engineLoop() {
                if(this.mode === 'none') return;
                requestAnimationFrame(() => this.engineLoop());
                const dt = this.clock.getDelta();
                const time = this.clock.getElapsedTime();

                if(this.mode === 'play' && this.playerGroup) {
                    const oldPos = this.playerGroup.position.clone();
                    const speed = 15;

                    // ПРАВИЛЬНОЕ УПРАВЛЕНИЕ (W - вперед)
                    if(this.keys['KeyW']) this.playerGroup.translateZ(-speed * dt);
                    if(this.keys['KeyS']) this.playerGroup.translateZ(speed * dt);
                    if(this.keys['KeyA']) this.playerGroup.translateX(-speed * dt);
                    if(this.keys['KeyD']) this.playerGroup.translateX(speed * dt);

                    // КОЛЛИЗИЯ
                    this.raycaster.set(this.playerGroup.position, new THREE.Vector3(0,0,-1).applyQuaternion(this.playerGroup.quaternion));
                    const hits = this.raycaster.intersectObjects(this.objectsToIntersect.slice(1));
                    if(hits.length > 0 && hits[0].distance < 1.2) this.playerGroup.position.copy(oldPos);

                    // АНИМАЦИЯ ХОДЬБЫ
                    const moving = this.keys['KeyW'] || this.keys['KeyS'] || this.keys['KeyA'] || this.keys['KeyD'];
                    if(moving) {
                        const s = Math.sin(time * 12) * 0.5;
                        this.rig.lArm.rotation.x = s; this.rig.rArm.rotation.x = -s;
                        this.rig.lLeg.rotation.x = -s; this.rig.rLeg.rotation.x = s;
                    }

                    // СЕТЬ
                    this.socket.emit('playerMovement', {
                        x: this.playerGroup.position.x, y: this.playerGroup.position.y, z: this.playerGroup.position.z,
                        ry: this.playerGroup.rotation.y
                    });

                    const camPos = new THREE.Vector3(0, 5, 10).applyMatrix4(this.playerGroup.matrixWorld);
                    this.camera.position.lerp(camPos, 0.1);
                    this.camera.lookAt(this.playerGroup.position.x, 1.5, this.playerGroup.position.z);
                }

                this.renderer.render(this.scene, this.camera);
            },

            loadData() {
                const s = localStorage.getItem('citrus_save');
                if(s) { const d = JSON.parse(s); this.balance = d.balance; this.inventory = d.inventory; }
            },
            saveData() { localStorage.setItem('citrus_save', JSON.stringify({balance: this.balance, inventory: this.inventory})); },
            buyItem(name, id, price) {
                if(this.balance >= price && !this.inventory.includes(id)) {
                    this.balance -= price; this.inventory.push(id);
                    document.getElementById('balance-val').innerText = this.balance;
                    this.saveData(); alert("Куплено!");
                }
            },
            exitGame() { location.reload(); },
            initAvatarPreview() { /* Стандартная превьюшка */ },
            renderMyGames() { /* Рендер списка */ }
        };

        document.getElementById('gl-canvas').addEventListener('click', () => {
            if(app.mode !== 'none') document.body.requestPointerLock();
        });
    </script>
</body>
</html>
