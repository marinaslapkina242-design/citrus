<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CITRUS | MULTIPLAYER EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --c-main: #00E5FF; --c-bg: #050505; --c-panel: #111; --c-text: #fff; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--c-bg); color: var(--c-text); overflow: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-family: inherit; font-weight: bold; }
        #ui-login { position: fixed; inset: 0; background: radial-gradient(circle, #111, #000); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: rgba(0, 0, 0, 0.8); padding: 40px; border-radius: 20px; border: 1px solid var(--c-main); text-align: center; width: 350px; box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .login-box input { width: 100%; padding: 15px; margin: 15px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; outline: none; }
        .btn-primary { background: var(--c-main); color: #000; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; }
        #ui-hub { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 10; }
        .hub-header { height: 70px; background: #0a0a0a; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid #222; }
        .hub-body { display: flex; flex: 1; }
        .sidebar { width: 250px; background: #080808; border-right: 1px solid #222; }
        .nav-item { padding: 20px; color: #888; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item.active { color: var(--c-main); background: #111; border-left-color: var(--c-main); }
        .content-area { flex: 1; padding: 40px; background: #050505; overflow-y: auto; }
        #engine-view { position: fixed; inset: 0; display: none; z-index: 50; }
        canvas { width: 100%; height: 100%; }
        .btn-exit { position: absolute; top: 20px; right: 20px; background: #ff3b30; color: white; padding: 10px 20px; border-radius: 8px; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui-login">
        <div class="login-box">
            <h1 style="color:var(--c-main); font-size:40px; margin:0;">CITRUS</h1>
            <p style="color:#666;">Твой мир. Твои правила.</p>
            <input type="text" id="username" placeholder="Придумай никнейм">
            <button class="btn-primary" onclick="app.login()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <div id="ui-hub" class="hidden">
        <div class="hub-header">
            <h2 style="color:var(--c-main); margin:0;">CITRUS</h2>
            <div style="margin-left:auto;"><span id="display-name"></span> | 💎 <span id="balance-val">5000</span></div>
        </div>
        <div class="hub-body">
            <div class="sidebar">
                <div class="nav-item active">Мультиплеер</div>
            </div>
            <div class="content-area">
                <h2>Доступные миры</h2>
                <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #222; cursor:pointer;" onclick="app.launch()">
                    <h3>🌐 Общий сервер (Online)</h3>
                    <p style="color:#888;">Зайди и встреться с друзьями прямо сейчас.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="engine-view">
        <button class="btn-exit" onclick="location.reload()">ВЫЙТИ</button>
        <div id="gl-canvas"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const app = {
            socket: null,
            otherPlayers: {},
            playerGroup: null,
            scene: null, camera: null, renderer: null, clock: new THREE.Clock(),
            keys: {},

            init() {
                // Подключаем сокеты (автоматически найдет твой Render-сервер)
                this.socket = io();
                
                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);

                // Слушаем сервер
                this.socket.on('currentPlayers', (players) => {
                    Object.keys(players).forEach((id) => {
                        if (id !== this.socket.id) this.addOtherPlayer(id, players[id]);
                    });
                });

                this.socket.on('newPlayer', (p) => this.addOtherPlayer(p.id, p));

                this.socket.on('playerMoved', (p) => {
                    if (this.otherPlayers[p.id]) {
                        this.otherPlayers[p.id].position.set(p.x, p.y, p.z);
                        this.otherPlayers[p.id].rotation.y = p.ry;
                    }
                });

                this.socket.on('playerDisconnected', (id) => {
                    if (this.otherPlayers[id]) {
                        this.scene.remove(this.otherPlayers[id]);
                        delete this.otherPlayers[id];
                    }
                });
            },

            login() {
                const name = document.getElementById('username').value || "Player";
                document.getElementById('display-name').innerText = name;
                document.getElementById('ui-login').classList.add('hidden');
                document.getElementById('ui-hub').classList.remove('hidden');
                this.init();
            },

            launch() {
                document.getElementById('ui-hub').classList.add('hidden');
                document.getElementById('engine-view').style.display = 'block';
                this.setupScene();
            },

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x050505);
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({antialias: true});
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                document.getElementById('gl-canvas').appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0x00E5FF, 1);
                sun.position.set(10, 20, 10);
                this.scene.add(sun);

                const grid = new THREE.GridHelper(100, 50, 0x00E5FF, 0x222222);
                this.scene.add(grid);

                // Создаем ТВОЕГО игрока
                this.playerGroup = this.buildCharacter(0x00E5FF);
                this.scene.add(this.playerGroup);

                this.loop();
            },

            buildCharacter(color) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: color}));
                body.position.y = 1.2;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0xffcc99}));
                head.position.y = 0.9;
                body.add(head);
                g.add(body);
                return g;
            },

            addOtherPlayer(id, info) {
                const model = this.buildCharacter(0xff0055); // Друзья будут розовыми
                model.position.set(info.x, info.y, info.z);
                this.otherPlayers[id] = model;
                this.scene.add(model);
            },

            loop() {
                requestAnimationFrame(() => this.loop());
                const dt = this.clock.getDelta();

                // Движение
                const speed = 10;
                if(this.keys['KeyW']) this.playerGroup.translateZ(-speed * dt);
                if(this.keys['KeyS']) this.playerGroup.translateZ(speed * dt);
                if(this.keys['KeyA']) this.playerGroup.rotation.y += 3 * dt;
                if(this.keys['KeyD']) this.playerGroup.rotation.y -= 3 * dt;

                // Отправка позиции на сервер
                if(this.socket) {
                    this.socket.emit('playerMovement', {
                        x: this.playerGroup.position.x,
                        y: this.playerGroup.position.y,
                        z: this.playerGroup.position.z,
                        ry: this.playerGroup.rotation.y
                    });
                }

                // Камера за игроком
                const camPos = new THREE.Vector3(0, 5, 10).applyMatrix4(this.playerGroup.matrixWorld);
                this.camera.position.lerp(camPos, 0.1);
                this.camera.lookAt(this.playerGroup.position);

                this.renderer.render(this.scene, this.camera);
            }
        };
    </script>
</body>
</html>
