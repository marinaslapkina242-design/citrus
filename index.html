<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CITRUS | ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --c-main: #FF9800; --c-glow: #FFB74D; --c-bg: #050505; --c-blue: #00E5FF; --c-green: #00E676; --c-pink: #FF4081; }
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--c-bg); color: #fff; overflow: hidden; }
        .hidden { display: none !important; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-family: inherit; font-weight: bold; }
        button:active { transform: scale(0.95); }

        /* LOGIN */
        #ui-login { position: fixed; inset: 0; background: radial-gradient(circle at 50% 40%, #1a0800, #000); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 45px; border-radius: 20px; border: 1px solid var(--c-main); text-align: center; width: 400px; }
        .login-box input { width: 100%; padding: 15px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-primary { background: linear-gradient(45deg, var(--c-main), var(--c-glow)); color: #000; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; text-transform: uppercase; }

        /* HUB */
        #ui-hub { display: flex; flex-direction: column; height: 100vh; }
        .hub-header { height: 70px; background: rgba(8,8,8,0.98); display: flex; align-items: center; padding: 0 35px; border-bottom: 1px solid #1a1a1a; }
        .hub-body { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: rgba(5,5,5,0.95); border-right: 1px solid #1a1a1a; padding: 20px 0; }
        .nav-item { padding: 14px 28px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: 0.25s; }
        .nav-item.active { color: var(--c-main); background: rgba(255,152,0,0.06); border-left: 3px solid var(--c-main); }
        .content-area { flex: 1; padding: 35px; overflow-y: auto; background: #070707; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
        .card { background: #0e0e0e; border-radius: 14px; border: 1px solid #1e1e1e; overflow: hidden; cursor: pointer; transition: 0.25s; }
        .card:hover { border-color: var(--c-main); transform: translateY(-3px); }
        .card-thumb { height: 130px; display: flex; justify-content: center; align-items: center; font-size: 55px; background: #0a0a0a; }
        .card-info { padding: 16px 18px; }

        /* ENGINE */
        #engine-view { position: fixed; inset: 0; display: none; z-index: 50; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 100; }
        .btn-exit { position: absolute; top: 20px; right: 20px; background: var(--c-pink); color: white; padding: 10px 20px; border-radius: 8px; z-index: 101; }
        
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div id="ui-login">
    <div class="login-box">
        <h1 style="color:var(--c-main); font-size:48px; margin:0;">CITRUS</h1>
        <p style="color:#555; margin-bottom:20px;">ИСПРАВЛЕННАЯ ВЕРСИЯ</p>
        <input type="text" id="user-nick" placeholder="Твой ник..." value="Игрок">
        <button class="btn-primary" onclick="app.login()">⚡ ВОЙТИ</button>
    </div>
</div>

<div id="ui-hub" class="hidden">
    <div class="hub-header">
        <h2 style="color:var(--c-main); margin:0;">CITRUS ONLINE</h2>
        <div style="margin-left:auto; display:flex; align-items:center; gap:20px;">
            <span id="display-name" style="color:#ccc;"></span>
            <span style="color:var(--c-main);">🍊 <span id="balance-val">0</span></span>
        </div>
    </div>
    <div class="hub-body">
        <div class="sidebar">
            <div class="nav-item active" onclick="app.switchTab('games')"><i class="fas fa-gamepad"></i> Миры</div>
            <div class="nav-item" onclick="app.switchTab('studio')"><i class="fas fa-cube"></i> Студия</div>
            <div class="nav-item" onclick="app.switchTab('friends')"><i class="fas fa-users"></i> Друзья</div>
        </div>
        <div class="content-area">
            <div id="tab-games">
                <h3 style="color:#444;">МОИ КАРТЫ:</h3>
                <div id="my-games-grid" class="grid">
                    </div>
            </div>
            <div id="tab-studio" class="hidden">
                <div style="background:#111; padding:30px; border-radius:15px; text-align:center; border:1px solid #222;">
                    <h3>🛠️ Создать новую карту</h3>
                    <button class="btn-primary" style="width:200px; margin-top:20px;" onclick="app.createNewMap()">НОВАЯ КАРТА</button>
                </div>
            </div>
            <div id="tab-friends" class="hidden">
                <div style="background:#111; padding:25px; border-radius:15px;">
                    <h3>👥 Друзья онлайн</h3>
                    <p style="color:#444;">Боты удалены. Список пуст.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="engine-view">
    <div id="crosshair"></div>
    <button class="btn-exit" onclick="app.exitGame()">ВЫЙТИ</button>
    <canvas id="game-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const app = {
    scene: null, camera: null, renderer: null, player: null,
    camRoot: null, camPitch: null,
    keys: {}, isLocked: false, active: false,
    customMaps: [],

    init() {
        // Загрузка карт из памяти
        const saved = localStorage.getItem('citrus_maps');
        if(saved) this.customMaps = JSON.parse(saved);
        this.renderMyGames();
    },

    login() {
        const nick = document.getElementById('user-nick').value;
        document.getElementById('display-name').innerText = nick;
        document.getElementById('ui-login').classList.add('hidden');
        document.getElementById('ui-hub').classList.remove('hidden');
        this.initEngine();
        this.init(); // Загружаем карты при входе
    },

    switchTab(t) {
        document.getElementById('tab-games').classList.add('hidden');
        document.getElementById('tab-friends').classList.add('hidden');
        document.getElementById('tab-studio').classList.add('hidden');
        document.getElementById('tab-' + t).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    },

    renderMyGames() {
        const grid = document.getElementById('my-games-grid');
        grid.innerHTML = '';
        if(this.customMaps.length === 0) {
            grid.innerHTML = '<p style="color:#555;">У тебя пока нет созданных карт.</p>';
            return;
        }
        this.customMaps.forEach((map, i) => {
            grid.innerHTML += `
                <div class="card" onclick="app.launch(${i})">
                    <div class="card-thumb">🏙️</div>
                    <div class="card-info"><b>${map.name}</b></div>
                </div>
            `;
        });
    },

    createNewMap() {
        const name = prompt("Название карты:", "Мой мир " + (this.customMaps.length + 1));
        if(name) {
            this.customMaps.push({ name: name, blocks: [] });
            localStorage.setItem('citrus_maps', JSON.stringify(this.customMaps));
            this.renderMyGames();
            this.switchTab('games');
        }
    },

    initEngine() {
        const cv = document.getElementById('game-canvas');
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x050505);

        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);

        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        this.scene.add(new THREE.GridHelper(200, 50, 0xff9800, 0x222222));

        // ИГРОК
        this.player = new THREE.Mesh(
            new THREE.BoxGeometry(1, 2, 1),
            new THREE.MeshPhongMaterial({ color: 0x00E5FF })
        );
        this.player.position.y = 1;
        this.scene.add(this.player);

        // КАМЕРА (3-Е ЛИЦО)
        this.camRoot = new THREE.Object3D(); 
        this.camPitch = new THREE.Object3D();
        this.scene.add(this.camRoot);
        this.camRoot.add(this.camPitch);
        
        this.camera.position.set(0, 3, 7); 
        this.camera.lookAt(0, 1, 0);
        this.camPitch.add(this.camera);

        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        window.addEventListener('mousemove', e => this.onMouseMove(e));
        
        document.addEventListener('pointerlockchange', () => {
            this.isLocked = document.pointerLockElement === cv;
        });

        this.animate();
    },

    launch(index) {
        this.active = true;
        document.getElementById('ui-hub').classList.add('hidden');
        document.getElementById('engine-view').style.display = 'block';
        document.getElementById('game-canvas').requestPointerLock();
    },

    exitGame() {
        this.active = false;
        document.exitPointerLock();
        document.getElementById('engine-view').style.display = 'none';
        document.getElementById('ui-hub').classList.remove('hidden');
    },

    onMouseMove(e) {
        if (!this.isLocked) return;
        this.player.rotation.y -= e.movementX * 0.003;
        this.camPitch.rotation.x -= e.movementY * 0.002;
        this.camPitch.rotation.x = Math.max(-0.7, Math.min(0.5, this.camPitch.rotation.x));
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        if (this.active && this.isLocked) {
            const speed = 0.15;
            const move = new THREE.Vector3();
            if (this.keys['KeyW']) move.z -= speed;
            if (this.keys['KeyS']) move.z += speed;
            if (this.keys['KeyA']) move.x -= speed;
            if (this.keys['KeyD']) move.x += speed;
            move.applyQuaternion(this.player.quaternion);
            this.player.position.add(move);
        }
        if (this.player) {
            this.camRoot.position.copy(this.player.position);
            this.camRoot.rotation.y = this.player.rotation.y;
        }
        this.renderer.render(this.scene, this.camera);
    }
};

window.addEventListener('resize', () => {
    if (app.camera) {
        app.camera.aspect = window.innerWidth / window.innerHeight;
        app.camera.updateProjectionMatrix();
        app.renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
</script>
</body>
</html>
